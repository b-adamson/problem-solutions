name: Build and publish problem sets

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find problem sets
        id: find
        run: |
          files=$(find . -mindepth 2 -maxdepth 2 -name 'main.tex' -not -path './_template/*' | sed 's|^\./||' | sort)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Compile LaTeX
        if: steps.find.outputs.files != ''
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ steps.find.outputs.files }}
          latexmk_use_xelatex: false
          work_in_root_file_dir: true

      - name: Assemble Pages site
        run: bash scripts/build_site.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
